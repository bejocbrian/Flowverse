name: Deploy API to Hostinger

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

concurrency:
  group: deploy-api
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy API
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: apps/api/package-lock.json

      - name: Install API production dependencies
        working-directory: apps/api
        run: npm ci --omit=dev

      - name: Deploy API via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_API_HOST }}
          username: ${{ secrets.FTP_API_USERNAME }}
          password: ${{ secrets.FTP_API_PASSWORD }}
          port: 21
          local-dir: apps/api/
          server-dir: ./
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/.env
            **/.env.*
            **/npm-debug.log
            **/.htaccess

      - name: Deploy summary
        if: success()
        run: |
          echo "============================================"
          echo "  API deploy completed!"
          echo "  ⚠️  MANUAL STEP REQUIRED:"
          echo "  Restart the Node.js app in hPanel:"
          echo "  hPanel → Websites → linen-herring-814961 → Node.js → Restart"
          echo "============================================"
