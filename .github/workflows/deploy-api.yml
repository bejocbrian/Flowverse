name: Deploy API to Hostinger

# NOTE: The API runs on Hostinger's managed Node.js (Business plan), which
# deploys via Hostinger's own Git integration / app manager - NOT via this
# workflow's PM2-over-SSH flow. This workflow is therefore manual-only
# (workflow_dispatch) so it does not fail on every push. Keep it for VPS/PM2
# setups or emergency manual deploys; trigger it from the Actions tab if
# you actually want the SSH-based deploy.
on:
  workflow_dispatch:

concurrency:
  group: deploy-api-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy API
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/api/package-lock.json

      # Install only production deps (locally, then ship them)
      - name: Install API production dependencies
        working-directory: apps/api
        run: npm ci --omit=dev

      - name: Create deployment archive
        working-directory: apps/api
        run: |
          tar -czf ../../api-release.tar.gz \
            --exclude='./.env*' \
            --exclude='./.git*' \
            ./src ./package.json ./package-lock.json ./node_modules

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.HOSTINGER_HOST }}
          SSH_PORT: ${{ vars.HOSTINGER_SSH_PORT || '22' }}
        run: |
          set -euo pipefail

          missing=0
          if [ -z "${SSH_PRIVATE_KEY:-}" ]; then
            echo "::error::Secret HOSTINGER_SSH_PRIVATE_KEY is empty or not set."
            missing=1
          fi
          if [ -z "${SSH_HOST:-}" ]; then
            echo "::error::Secret HOSTINGER_HOST is empty or not set."
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            echo "Set the required secrets under Settings > Secrets and variables > Actions (Environment: production)."
            exit 1
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          if ! ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts; then
            echo "::error::ssh-keyscan failed for $SSH_HOST:$SSH_PORT. Check HOSTINGER_HOST / HOSTINGER_SSH_PORT and that the host allows SSH from GitHub runners."
            exit 1
          fi

      - name: Upload archive to Hostinger
        env:
          SSH_USER: ${{ secrets.HOSTINGER_USER }}
          SSH_HOST: ${{ secrets.HOSTINGER_HOST }}
          SSH_PORT: ${{ vars.HOSTINGER_SSH_PORT || '22' }}
          API_REMOTE_DIR: ${{ vars.HOSTINGER_API_DIR }}
        run: |
          scp -P "$SSH_PORT" api-release.tar.gz "$SSH_USER@$SSH_HOST:$API_REMOTE_DIR/api-release.tar.gz"

      - name: Extract and restart API on server
        env:
          SSH_USER: ${{ secrets.HOSTINGER_USER }}
          SSH_HOST: ${{ secrets.HOSTINGER_HOST }}
          SSH_PORT: ${{ vars.HOSTINGER_SSH_PORT || '22' }}
          API_REMOTE_DIR: ${{ vars.HOSTINGER_API_DIR }}
          PM2_APP_NAME: ${{ vars.PM2_APP_NAME || 'api' }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" bash -s <<EOF
            set -euo pipefail
            cd "$API_REMOTE_DIR"

            # Backup the current release (if any) so we can roll back
            if [ -d current ]; then
              rm -rf previous
              mv current previous
            fi

            # Stage and atomically swap
            mkdir -p staging
            tar -xzf api-release.tar.gz -C staging
            mv staging current
            rm -f api-release.tar.gz

            # Preserve the existing .env file in current/ if you keep it outside the release
            if [ -f .env ]; then
              cp .env current/.env
            fi

            cd current

            # Restart with PM2 if available, otherwise fall back to Hostinger Node.js Application Manager
            if command -v pm2 >/dev/null 2>&1; then
              pm2 reload "$PM2_APP_NAME" --update-env || pm2 start src/main.js --name "$PM2_APP_NAME" --update-env
              pm2 save
            else
              echo "PM2 not found. Restart the app manually from Hostinger hPanel -> Advanced -> Node.js."
            fi
          EOF