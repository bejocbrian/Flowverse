name: Deploy API to Hostinger

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

concurrency:
  group: deploy-api-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy API
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: apps/api/package-lock.json

      - name: Install API production dependencies
        working-directory: apps/api
        run: npm ci --omit=dev

      # Upload src + node_modules via FTP.
      # Hostinger Business Node.js apps are restarted from hPanel after deploy.
      # FTP works from GitHub runner IPs; SSH port 65002 is blocked.
      #
      # NOTE: After this step finishes, you must manually restart the Node.js
      # app in hPanel (Websites → <site> → Node.js → Restart) so the new
      # code takes effect. The old process keeps running until restarted.
      - name: Deploy API src via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ vars.FTP_PORT || 21 }}
          local-dir: apps/api/
          server-dir: ${{ vars.FTP_API_REMOTE_DIR || './' }}
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/.env
            **/.env.*
            **/npm-debug.log

      - name: Remind to restart Node.js in hPanel
        run: |
          echo "=========================================================="
          echo "  API files uploaded via FTP."
          echo "  ACTION REQUIRED: Restart the Node.js app in hPanel."
          echo "  hPanel → Websites → linen-herring-814961 → Node.js → Restart"
          echo "  The old process is still running until you restart it."
          echo "=========================================================="
