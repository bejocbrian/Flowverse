name: Deploy API to Hostinger

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-api-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy API
    runs-on: ubuntu-latest
    environment: production
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.HOSTINGER_HOST }}
          SSH_PORT: ${{ vars.HOSTINGER_SSH_PORT || '22' }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync apps/api to server
        env:
          SSH_USER: ${{ secrets.HOSTINGER_USER }}
          SSH_HOST: ${{ secrets.HOSTINGER_HOST }}
          SSH_PORT: ${{ vars.HOSTINGER_SSH_PORT || '22' }}
          API_REMOTE_DIR: ${{ vars.HOSTINGER_API_DIR }}
        run: |
          rsync -az --delete \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='node_modules' \
            --exclude='.git' \
            -e "ssh -p $SSH_PORT -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new" \
            apps/api/ \
            "$SSH_USER@$SSH_HOST:$API_REMOTE_DIR/apps/api/"

      - name: Sync root package.json files to server
        env:
          SSH_USER: ${{ secrets.HOSTINGER_USER }}
          SSH_HOST: ${{ secrets.HOSTINGER_HOST }}
          SSH_PORT: ${{ vars.HOSTINGER_SSH_PORT || '22' }}
          API_REMOTE_DIR: ${{ vars.HOSTINGER_API_DIR }}
        run: |
          # Copy root package files so workspaces resolution stays in sync
          scp -P "$SSH_PORT" -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new \
            package.json package-lock.json \
            "$SSH_USER@$SSH_HOST:$API_REMOTE_DIR/"

      - name: Install dependencies and restart Passenger
        env:
          SSH_USER: ${{ secrets.HOSTINGER_USER }}
          SSH_HOST: ${{ secrets.HOSTINGER_HOST }}
          SSH_PORT: ${{ vars.HOSTINGER_SSH_PORT || '22' }}
          API_REMOTE_DIR: ${{ vars.HOSTINGER_API_DIR }}
        run: |
          ssh -p "$SSH_PORT" -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new \
            "$SSH_USER@$SSH_HOST" bash <<EOF
              set -euo pipefail
              cd "$API_REMOTE_DIR"
              echo "--- Installing dependencies ---"
              npm ci --omit=dev --workspaces --include-workspace-root
              echo "--- Restarting Passenger ---"
              mkdir -p tmp
              touch tmp/restart.txt
              echo "--- Deploy finished ---"
          EOF