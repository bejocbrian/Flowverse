name: Deploy Web to Hostinger

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Build & Deploy Web
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/web/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Build web
        working-directory: apps/web
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_POCKETBASE_URL: ${{ secrets.VITE_POCKETBASE_URL }}
          VITE_CASHFREE_ENV: ${{ secrets.VITE_CASHFREE_ENV }}
          VITE_TURNSTILE_SITE_KEY: ${{ secrets.VITE_TURNSTILE_SITE_KEY }}
        run: npm run build

      - name: Setup SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.HOSTINGER_HOST }}
          SSH_PORT: ${{ vars.HOSTINGER_SSH_PORT || '65002' }}
        run: |
          set -euo pipefail

          if [ -z "${SSH_PRIVATE_KEY:-}" ]; then
            echo "::error::Secret HOSTINGER_SSH_PRIVATE_KEY is not set. Go to repo Settings > Secrets > Actions (environment: production)."
            exit 1
          fi
          if [ -z "${SSH_HOST:-}" ]; then
            echo "::error::Secret HOSTINGER_HOST is not set."
            exit 1
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          # Hostinger shared hosting blocks ssh-keyscan from GitHub runner IPs.
          # We write the host key directly instead of scanning.
          # StrictHostKeyChecking=accept-new on first connect adds it automatically.
          cat >> ~/.ssh/config <<EOF
          Host hostinger
            HostName $SSH_HOST
            Port $SSH_PORT
            User ${{ secrets.HOSTINGER_USER }}
            IdentityFile ~/.ssh/id_ed25519
            StrictHostKeyChecking accept-new
            ConnectTimeout 30
          EOF
          chmod 600 ~/.ssh/config

      - name: Sync dist to Hostinger via rsync
        env:
          SSH_USER: ${{ secrets.HOSTINGER_USER }}
          SSH_HOST: ${{ secrets.HOSTINGER_HOST }}
          SSH_PORT: ${{ vars.HOSTINGER_SSH_PORT || '65002' }}
          WEB_REMOTE_DIR: ${{ vars.HOSTINGER_WEB_DIR }}
        run: |
          set -euo pipefail

          if [ -z "${SSH_USER:-}" ]; then
            echo "::error::Secret HOSTINGER_USER is not set."
            exit 1
          fi
          if [ -z "${WEB_REMOTE_DIR:-}" ]; then
            echo "::error::Variable HOSTINGER_WEB_DIR is not set. Set it to the absolute path on Hostinger, e.g. /home/user/public_html"
            exit 1
          fi

          rsync -az --delete \
            -e "ssh -p ${SSH_PORT} -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30" \
            apps/web/dist/ \
            "${SSH_USER}@${SSH_HOST}:${WEB_REMOTE_DIR}/"

          echo "Web deployed to ${WEB_REMOTE_DIR} on ${SSH_HOST}"
