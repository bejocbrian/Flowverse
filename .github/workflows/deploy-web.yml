name: Deploy Web to Hostinger

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Build & Deploy Web
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/web/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Build web
        working-directory: apps/web
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_POCKETBASE_URL: ${{ secrets.VITE_POCKETBASE_URL }}
          VITE_CASHFREE_ENV: ${{ secrets.VITE_CASHFREE_ENV }}
          VITE_TURNSTILE_SITE_KEY: ${{ secrets.VITE_TURNSTILE_SITE_KEY }}
        run: npm run build

      # FTP upload — works on Hostinger shared/Business hosting.
      # SSH/rsync is blocked from GitHub runner IPs; FTP is not.
      # Uses SamKirkland/FTP-Deploy-Action which handles incremental sync
      # (only changed files are uploaded, --delete removes stale files).
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ vars.FTP_PORT || 21 }}
          local-dir: apps/web/dist/
          server-dir: ${{ vars.FTP_REMOTE_DIR || './' }}
          # Only upload changed files; delete files removed from dist
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
