name: Deploy Web to Hostinger

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

concurrency:
  group: deploy-web
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Build & Deploy Web
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/web/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Build web
        working-directory: apps/web
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_POCKETBASE_URL: ${{ secrets.VITE_POCKETBASE_URL }}
          VITE_CASHFREE_ENV: ${{ secrets.VITE_CASHFREE_ENV }}
          VITE_TURNSTILE_SITE_KEY: ${{ secrets.VITE_TURNSTILE_SITE_KEY }}
        run: npm run build

      - name: Verify build output
        run: |
          if [ ! -f apps/web/dist/index.html ]; then
            echo "::error::Build failed - index.html not found in dist/"
            exit 1
          fi
          echo "Build verified. Files in dist/:"
          ls -la apps/web/dist/
          echo "---"
          head -5 apps/web/dist/index.html

      - name: Deploy via FTP (attempt 1)
        id: deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ vars.FTP_PORT || 21 }}
          local-dir: apps/web/dist/
          server-dir: ${{ vars.FTP_REMOTE_DIR || './' }}
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**

      - name: Verify deployment
        run: |
          echo "Waiting 10s for CDN/server cache to clear..."
          sleep 10
          SITE_URL="https://${{ vars.SITE_DOMAIN || 'www.flowverse.online' }}"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$SITE_URL" || echo "000")
          echo "Site returned HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" = "000" ]; then
            echo "::warning::Could not reach site after deploy - may need a moment to propagate"
          fi

      - name: Deploy summary
        if: success()
        run: |
          echo "============================================"
          echo "  Web deploy completed successfully!"
          echo "  Site: https://${{ vars.SITE_DOMAIN || 'www.flowverse.online' }}"
          echo "  Commit: ${{ github.sha }}"
          echo "============================================"
