# Dependabot configuration
# See: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates

version: 2

updates:
  # Enable version updates for npm packages
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: UTC
    open-pull-requests-limit: 10
    commit-message:
      prefix: deps
      include: scope
    labels:
      - dependencies
    reviewers:
      - # Add your team/username here, e.g. ["your-org/dev-team"]
    groups:
      # Group minor and patch updates together for less noise
      production-dependencies:
        patterns:
          - '*'
        exclude-patterns:
          - '@types/*'
          - '@eslint/*'
          - 'eslint-*'
          - 'devDependencies'
        update-types:
          - minor
          - patch
      dev-dependencies:
        patterns:
          - '@types/*'
          - '@eslint/*'
          - 'eslint-*'
        update-types:
          - minor
          - patch

  # Enable version updates for GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: UTC
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci
      include: scope
    labels:
      - ci